<body>

    <!-- Start Contact Area -->
    <section id="contact">
        <div class="section-content">
            <h1 class="section-header">Get in <span class="content-header"> Touch with me</span></h1>
            <h3>Please feel free to contact me if you have any questions</h3>
        </div>
        <div class="contact-section">
            <div class="container">
                <form onsubmit="return validate()" action="http://formspree.io/ziani.zoheir@gmail.com" method="POST">
                    <div class="row">
                        <div class="col-xs-6 col-sm-6 col-md-6 col-lg-6">
                            <div class="form-group">
                                <label for="name">Your name :</label>
                                <input class="form-control" type="text" id="name" name="name" placeholder="Your Name" onchange="change()">
                            </div>
                            <div class="form-group">
                                <label for="email">Your e-mail address :</label>
                                <input class="form-control" type="email" id="email" name="email" placeholder="example@email.com">
                            </div>
                            <div class="form-group">
                                <label for="tel">Your phone number :</label>
                                <input class="form-control" type="tel" id="tel" name="tel" placeholder="+212 7 00 00 00 00">
                            </div>
                        </div>
                        <div class="col-xs-6 col-sm-6 col-md-6 col-lg-6">
                            <div class="form-group">
                                <label for="message"></label>
                                <textarea class="form-control" id="message" name="message" placeholder="Enter Your Message" autofocus></textarea>
                            </div>
                            <input type="submit" value="Send" class="btn btn-default submit">
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </section>
